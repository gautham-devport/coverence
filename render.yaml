services:
    - type: web
      name: coverence-backend
      env: python
      plan: free
      workingDir: src/coverence
      buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
      startCommand: daphne -b 0.0.0.0 -p 10000 coverence.asgi:application
      autoDeploy: true
      envVars:
          - key: DJANGO_SETTINGS_MODULE
            value: coverence.settings
          - key: SECRET_KEY
            value: your-secret-key
          - key: DEBUG
            value: False
          - key: ALLOWED_HOSTS
            value: coverence-backend.onrender.com
          - key: REDIS_URL
            value: your-redis-url
          - key: PORT
            value: 10000
